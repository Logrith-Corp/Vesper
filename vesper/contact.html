<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — VESPER</title>
<meta name="description" content="Get in touch with the VESPER team for product or support questions." />
<link rel="canonical" href="https://getvesper.in/contact" />
<link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico" />
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="assets/favicon/android-chrome-192x192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="assets/favicon/android-chrome-512x512.png" />
<link rel="apple-touch-icon" href="assets/favicon/apple-touch-icon.png" />
<link rel="manifest" href="assets/favicon/site.webmanifest" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="site-navbar"></div>

<div class="container">
  <p class="breadcrumb"><a href="index.html">Home</a> / Contact</p>
  <section class="page-hero">
    <span class="eyebrow">VESPER / Get in Touch</span>
    <h1>Contact us</h1>
    <p>Product questions, support, or anything else — send a message and we'll get back to you.</p>
  </section>

  <section class="section" style="border-top:none; padding-top:0; padding-bottom:100px;">
    <div style="max-width: 560px;">
      <form id="contact-form" onsubmit="handleSubmit(event)">
        <div class="form-field">
          <label for="name">Name</label>
          <input type="text" id="name" required />
        </div>
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Send Message</button>
      </form>
      <p style="color: var(--text-faint); font-size: 13px; margin-top: 18px;">
        Or email us directly at <span style="color: var(--text-dim);">support@getvesper.in</span>
      </p>
    </div>
  </section>
</div>

<div id="site-footer"></div>

<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/app.js"></script>
<script>
  injectLayout("contact");
</script>
<script>
  function handleSubmit(e) {
    e.preventDefault();
    showToast("Message sent — we'll reply soon.");
    document.getElementById("contact-form").reset();
  }
</script>
</body>
</html>
